<script type="text/javascript">
    $(document).ready(function() {
        $(".sc").each(function() {
            var text = $(this).text();
            var newText = "";
            // lower - 1
            // upper - 2
            var crt = 0;
            for (var i = 0; i < text.length; i++) {
                var c = text[i];
                if (c == c.toLowerCase()) {
                    if (crt != 1) {
                        if (crt == 2) {
                            newText = newText + '</span>';
                        }
                        newText = newText + '<span class="sc-l">';
                    }
                    newText = newText + c.toUpperCase();
                    crt = 1;
                }
                else {
                    if (crt != 2) {
                        if (crt == 1) {
                            newText = newText + '</span>';
                        }
                        newText = newText + '<span class="sc-u">';
                    }
                    newText = newText + c;
                    crt = 2;
                }
            }
            if (crt != 0) {
                newText = newText + '</span>'
            }
            $(this).html(newText);
        });
    });
</script>
